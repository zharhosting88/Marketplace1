<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;

}

body{
  background:linear-gradient(180deg,#0f172a,#000);
  color:#fff;
  text-align:center;
  padding:30px 20px;
}

.profile-img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:4px solid #3b82f6;
  padding:4px;
  animation:spin 8s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

h1{
  margin-top:15px;
  font-size:26px;
  font-weight:700;
}

.verify{

.desc{

  margin-bottom:25px;
}

.link{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(145deg,#1e293b,#111827);
  padding:15px;
  margin:12px auto;
  width:100%;
  max-width:420px;
  border-radius:15px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
  transition:0.3s;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.link:hover{
  transform:scale(1.05);
  background:#1e293b;
}

.link i{
  font-size:18px;
}

.music-box{
  background:linear-gradient(145deg,#1e293b,#111827);
  max-width:420px;
  margin:25px auto;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.music-title{
  font-weight:600;
  margin-bottom:10px;
}

audio{
  width:100%;
}

.theme-btn{
  margin-top:20px;
  padding:12px;
  border-radius:20px;
  background:#1e293b;
  cursor:pointer;
  transition:0.3s;
}

.theme-btn:hover{
  background:#3b82f6;
}

.light{
  background:#f3f4f6;
  color:#111;
}

.light .link{
  background:#fff;
  color:#000;
}

.light .music-box{
  background:#fff;
  color:#000;
}
</style>
