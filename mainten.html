<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sedang Perbaikan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron', sans-serif;
    color:#fff;
}
.card{
    max-width:420px;
    width:90%;
    padding:35px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:22px;
    text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.5);
    animation:fadeUp .8s ease;
}
@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
}
.icon{
    font-size:64px;
    margin-bottom:15px;
}
h1{
    font-size:22px;
    margin-bottom:10px;
}
p{
    font-size:14px;
    color:#ddd;
    line-height:1.6;
    margin-bottom:25px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#38f9d7,#00e5ff);
    color:#002b36;
    box-shadow:0 0 25px rgba(56,249,215,.7);
    transition:.3s;
}
button:hover{
    box-shadow:0 0 40px rgba(56,249,215,1);
    transform:translateY(-2px);
}
button:active{
    transform:scale(.95);
}
.footer{
    margin-top:15px;
    font-size:12px;
    opacity:.7;
}
.icon i{
    font-size:64px;
    color:#38f9d7;
    text-shadow:0 0 20px rgba(56,249,215,.8);
}
  h2 {
    font-size:70px;
    margin-bottom:10px;
  }
</style>
</head>
<body>

<div class="card">
    <div class="icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
    <h1> </h1>
    <h2>
        404
    </h2>

    <button onclick="kembali()">⬅ Kembali</button>

    <div class="footer">
        copyright@zhar_web
    </div>
</div>

<script>
function kembali(){
    window.history.back();
}
</script>

</body>
</html>
